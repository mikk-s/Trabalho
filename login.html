<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MekaByte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow p-4 container-form m-3" style="width: 100%; max-width: 420px; border-radius: 12px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-dark">Entrar</h2>
            <p class="text-muted">Acesse o painel do sistema</p>
        </div>

        <div id="mensagemLogin" class="alert d-none" role="alert"></div>

        <form id="formLogin" novalidate>
            <div class="mb-3">
                <label for="loginUsuario" class="form-label">Usuário</label>
                <input type="text" class="form-control" id="loginUsuario" placeholder="Seu usuário..." required>
            </div>
            <div class="mb-4">
                <label for="loginSenha" class="form-label">Senha</label>
                <input type="password" class="form-control" id="loginSenha" placeholder="Sua senha..." required>
            </div>
            <button type="submit" class="btn btn-dark w-100 fw-bold mb-3 text-white">Entrar no Sistema</button>
            <div class="text-center">
                <a href="cadastro.html" class="text-decoration-none small text-info fw-bold">Não tem conta? Cadastre-se</a>
            </div>
        </form>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
