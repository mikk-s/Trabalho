<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MekaByte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light text-dark d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow w-100">
        <div class="container">
            <a class="navbar-brand fw-bold text-info" href="index.html">🌐 MekaByte</a>
            <div>
                <a href="login.html" class="btn btn-outline-light me-2">Login</a>
                <a href="cadastro.html" class="btn btn-info">Cadastrar</a>
            </div>
        </div>
    </nav>

    <main class="container d-flex flex-column justify-content-center align-items-center flex-grow-1 py-5">
        <div class="card shadow p-4 w-100" style="max-width: 420px; border-radius: 12px;">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-dark">Entrar</h2>
                <p class="text-muted">Acesse o painel do sistema</p>
            </div>

            <div id="mensagemLogin" class="alert d-none" role="alert"></div>

            <form id="formLogin" novalidate>
                <div class="mb-3">
                    <label for="loginUsuario" class="form-label fw-semibold">Usuário</label>
                    <input type="text" class="form-control" id="loginUsuario" placeholder="Seu usuário..." required>
                </div>
                <div class="mb-4">
                    <label for="loginSenha" class="form-label fw-semibold">Senha</label>
                    <input type="password" class="form-control" id="loginSenha" placeholder="Sua senha..." required>
                </div>
                <button type="submit" class="btn btn-dark w-100 fw-bold mb-3 text-white">Entrar no Sistema</button>
                <div class="text-center">
                    <a href="cadastro.html" class="text-decoration-none small text-info fw-bold">Não tem conta? Cadastre-se</a>
                </div>
            </form>
        </div>
    </main>

    <footer class="bg-dark text-white-50 text-center py-3 mt-auto w-100">
        <small>&copy; 2026 MekaByte. Todos os direitos reservados.</small>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
