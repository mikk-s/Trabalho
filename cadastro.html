<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - MekaByte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow p-4 container-form m-3" style="width: 100%; max-width: 420px; border-radius: 12px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-dark">Criar Conta</h2>
            <p class="text-muted">Faça parte da MekaByte</p>
        </div>
        
        <!-- Mensagens de Feedback -->
        <div id="mensagemCadastro" class="alert d-none" role="alert"></div>

        <form id="formCadastro" novalidate>
            <div class="mb-3">
                <label for="cadUsuario" class="form-label">Usuário</label>
                <input type="text" class="form-control" id="cadUsuario" placeholder="Digite seu usuário..." required>
            </div>
            <div class="mb-4">
                <label for="cadSenha" class="form-label">Senha</label>
                <input type="password" class="form-control" id="cadSenha" placeholder="Digite sua senha..." required>
                <div class="form-text text-muted small">A senha deve conter pelo menos um caractere especial.</div>
            </div>
            <button type="submit" class="btn btn-info w-100 fw-bold mb-3">Concluir Cadastro</button>
            <div class="text-center">
                <a href="index.html" class="text-decoration-none small text-secondary">Voltar ao Início</a>
            </div>
        </form>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
